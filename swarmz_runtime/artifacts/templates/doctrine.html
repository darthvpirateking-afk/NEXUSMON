<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  body { background:#0D1117; color:#F0F6FC; font-family:Consolas,'Courier New',monospace; padding:48px; max-width:800px; margin:0 auto; }
  h1 { color:#FFD700; font-size:1.2rem; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:8px; }
  .divider { border:none; border-top:1px solid #FFD700; margin:18px 0; opacity:0.4; }
  .content { font-size:0.93rem; white-space:pre-wrap; line-height:1.9; color:#F0F6FC; }
  .meta { color:#8B949E; font-size:0.74rem; margin-top:32px; }
  footer { margin-top:20px; text-align:center; color:#30363D; font-size:0.70rem; letter-spacing:0.08em; }
  footer span { color:#FFD700; }
</style>
</head>
<body>
<h1>{{TITLE}}</h1>
<hr class="divider">
<div class="content">{{CONTENT}}</div>
<hr class="divider">
<div class="meta">Operator: {{OPERATOR}} &nbsp;|&nbsp; {{TIMESTAMP}}</div>
<footer><span>◈</span> NEXUSMON · DOCTRINE · v2.1.0 <span>◈</span></footer>
</body>
</html>
